# SealedSecret for the rMAPI auth token.
#
# Generate this file once by running the commands in README.md under
# "Create the SealedSecret". The output replaces this entire file.
#
# The sealed ciphertext is safe to commit to git — only your cluster's
# Sealed Secrets controller can decrypt it.
#
# TEMPLATE — replace with your sealed output:
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: rmapi-token
  namespace: remarkable
spec:
  encryptedData:
    # Replace this value with the output of the kubeseal command in README.md
    .rmapi: REPLACE_WITH_SEALED_OUTPUT
  template:
    metadata:
      name: rmapi-token
      namespace: remarkable
    type: Opaque
