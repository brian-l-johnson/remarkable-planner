apiVersion: apps/v1
kind: Deployment
metadata:
  name: planner-sync
  namespace: remarkable
  labels:
    app: planner-sync
spec:
  replicas: 1
  selector:
    matchLabels:
      app: planner-sync
  template:
    metadata:
      labels:
        app: planner-sync
    spec:
      containers:
        - name: planner-sync
          # Replace YOUR_GITHUB_USERNAME with your GitHub username
          image: ghcr.io/YOUR_GITHUB_USERNAME/remarkable-planner-sync:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: RMAPI_SERVICE_URL
              value: "http://rmapi-uploader.remarkable.svc.cluster.local"
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: planner-sync
  namespace: remarkable
spec:
  selector:
    app: planner-sync
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
