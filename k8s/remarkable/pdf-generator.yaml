apiVersion: apps/v1
kind: Deployment
metadata:
  name: pdf-generator
  namespace: remarkable
  labels:
    app: pdf-generator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pdf-generator
  template:
    metadata:
      labels:
        app: pdf-generator
    spec:
      containers:
        - name: pdf-generator
          # Replace YOUR_GITHUB_USERNAME with your GitHub username
          image: ghcr.io/YOUR_GITHUB_USERNAME/remarkable-pdf-generator:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: pdf-generator
  namespace: remarkable
spec:
  selector:
    app: pdf-generator
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
